<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | Ferretería Los 4H</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <nav class="navbar">

        <div class="logo-area">
            <img src="ferreteria4h.png" alt="Logo Ferretería Los 4H" class="logo">
            <span class="brand-name">FERRETERÍA LOS 4H</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Buscar productos...">
            <button><i class="fas fa-search"></i></button>
        </div>

    </nav>
</header>

<div class="container">
    <h2 class="section-title">Ubicaciones y Contacto</h2>

    <div class="contact-container">

        <div class="contact-info">
            <h3>Nuestras Sucursales</h3>
            <p><i class="fas fa-map-marker-alt"></i> Altavista, Ilopango.</p>
            <p><i class="fas fa-map-marker-alt"></i> La Fuente, Ilopango.</p>
            <p><i class="fas fa-phone-alt"></i> WhatsApp: +503 7950-0328</p>
<div style="margin-top: 20px; border-radius: 8px; overflow: hidden;">
    <iframe 
        src="https://www.google.com/maps?q=Ferretería+Los+4+Hermanos+Altavista,+Ilopango,+El+Salvador&output=embed" 
        width="100%" 
        height="250" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
</div>

        </div>

        <div class="contact-form">
            <h3>Solicitar Cotización</h3>

            <form id="whatsapp-form">
                <input type="text" id="nombre" placeholder="Tu Nombre Completo" required>
                <input type="text" id="producto" placeholder="¿Qué materiales buscas?" required>
                <textarea id="mensaje" rows="4" placeholder="Detalles de tu pedido..." required></textarea>
                <button type="submit">
                    Enviar a WhatsApp <i class="fab fa-whatsapp"></i>
                </button>
            </form>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Ferretería Los 4H - Ilopango, El Salvador.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
